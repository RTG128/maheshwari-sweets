<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Maheshwari Sweets</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #800000;
            --accent: #d4af37;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: linear-gradient(135deg, #800000 0%, #4a0000 100%); 
            margin: 0;
        }

        .login-box { 
            background: white; 
            padding: 40px 30px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); 
            width: 100%;
            max-width: 350px; 
            text-align: center;
            border: 2px solid var(--accent);
        }

        .logo-circle {
            width: 70px;
            height: 70px;
            background: var(--primary);
            color: var(--accent);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: 700;
            margin: 0 auto 20px;
            border: 3px solid var(--accent);
        }

        h2 { 
            color: var(--primary); 
            margin-bottom: 10px;
            font-weight: 700;
        }

        p {
            color: #666;
            font-size: 0.85rem;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #444;
            margin-bottom: 5px;
            margin-left: 5px;
        }

        input { 
            width: 100%; 
            padding: 14px; 
            border: 1.5px solid #eee; 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-family: inherit;
            font-size: 1rem;
            background: #f9f9f9;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(128, 0, 0, 0.05);
        }

        button { 
            width: 100%; 
            padding: 14px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 1rem;
            font-weight: 700;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(128, 0, 0, 0.2);
        }

        button:hover { 
            background: #a00000; 
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(128, 0, 0, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .footer-text {
            margin-top: 25px;
            font-size: 0.75rem;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo-circle">M</div>
        <h2>Admin Access</h2>
        <p>Maheshwari Sweets Control Panel</p>
        
        <div class="input-group">
            <label>Master Password</label>
            <input type="password" id="adminPass" placeholder="••••••••" autofocus>
        </div>

        <button onclick="login()" id="loginBtn">Unlock Dashboard</button>
        
        <div class="footer-text">
            &copy; 2026 Maheshwari Sweets Ulatu
        </div>
    </div>

    <script>
        // Password check function
        function login() {
            const passField = document.getElementById('adminPass');
            const btn = document.getElementById('loginBtn');
            const pass = passField.value;

            if(pass === 'ulatu7833') { 
                btn.innerHTML = "Opening...";
                btn.style.background = "#28a745";
                localStorage.setItem('ms_admin_logged', 'true');
                
                setTimeout(() => {
                    window.location.href = 'admin.html';
                }, 500);
            } else {
                alert('❌ Galat password! Dubara koshish karein.');
                passField.value = '';
                passField.focus();
            }
        }

        // Enter key support
        document.getElementById('adminPass').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                login();
            }
        });
    </script>
</body>
</html>
